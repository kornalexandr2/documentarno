services:
  postgres:
    image: postgres:15-alpine
    container_name: doc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-doc_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_super_secret}
      POSTGRES_DB: ${POSTGRES_DB:-documentarno}
    volumes:
      - ${DATA_PATH:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: doc_redis
    restart: unless-stopped
    volumes:
      - ${DATA_PATH:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: doc_qdrant
    restart: unless-stopped
    volumes:
      - ${DATA_PATH:-./data}/qdrant:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: doc_ollama
    restart: unless-stopped
    volumes:
      - ${DATA_PATH:-./data}/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc_backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file:
      - .env
    volumes:
      - ${DOC_SOURCE_PATH:-./doc_source}:/app/doc_source
      - ${DATA_PATH:-./data}/ollama:/app/models
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s = socket.socket(); s.connect((\"localhost\", 8000))' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc_celery_worker
    restart: unless-stopped
    command: celery -A app.worker.celery_app worker -l info -c 1
    shm_size: '2gb'
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ${DOC_SOURCE_PATH:-./doc_source}:/app/doc_source:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc_celery_beat
    restart: unless-stopped
    command: celery -A app.worker.celery_app beat -l info
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - .env

  telegram_bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc_telegram_bot
    restart: unless-stopped
    command: python3 -m app.worker.bot
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env

  fs_watchdog:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc_fs_watchdog
    restart: unless-stopped
    command: python3 -m app.worker.fs_watchdog
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ${DOC_SOURCE_PATH:-./doc_source}:/app/doc_source

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: doc_frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: doc_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
